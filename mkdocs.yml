site_name: Fiddy
site_description: AI-Powered Alcohol Label Verification App
site_author: Terry D. Eppler

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: INSTALLATION.md
  - Poppler PATH Setup: PATH-POPPLER.md
  - Azure Deployment: AZURE_DEPLOYMENT.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - codehilite
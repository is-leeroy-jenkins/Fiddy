site_name: Fiddy
site_description: AI-Powered Alcohol Label Verification App
site_author: Terry D. Eppler

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: INSTALLATION.md
  - Architecture: ARCHITECTURE.md
  - API Reference: API.md
  - Acceptance: ACCEPTANCE.md
  - Accessibility: ACCESSIBILITY.md
  - Development: DEVELOPMENT.md
  - Poppler PATH Setup: PATH-POPPLER.md
  - Azure Deployment: AZURE_DEPLOYMENT.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            members_order: source

markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - codehilite
  - toc:
      permalink: true